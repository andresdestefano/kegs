<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>el viaje Craft Beer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { --tinta: #1a1a1a; --fondo: #f7f4ee; --dorado: #b8860b; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--fondo); color: var(--tinta); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 28px 18px 40px; }
  .logo { width: min(320px, 72vw); margin: 8px 0 4px; }
  .codigo { font-size: 12px; letter-spacing: 3px; color: #999; font-weight: 600; margin-bottom: 22px; }
  .carta { background: #fff; border-radius: 18px; box-shadow: 0 2px 14px rgba(0,0,0,.08); padding: 26px 24px; max-width: 480px; width: 100%; text-align: center; }
  .producto { font-size: 26px; font-weight: 800; line-height: 1.2; }
  .estilo { font-size: 15px; color: var(--dorado); font-weight: 600; margin-top: 6px; letter-spacing: .5px; }
  .datos { display: flex; justify-content: center; gap: 22px; margin: 18px 0 4px; }
  .dato { text-align: center; }
  .dato .v { font-size: 20px; font-weight: 800; }
  .dato .k { font-size: 11px; letter-spacing: 2px; color: #999; font-weight: 600; }
  .desc { margin-top: 18px; font-size: 15.5px; line-height: 1.6; color: #444; }
  .desc-en { margin-top: 12px; font-size: 13.5px; line-height: 1.55; color: #999; font-style: italic; }
  .lote { margin-top: 20px; padding-top: 14px; border-top: 1px solid #eee; font-size: 12.5px; color: #888; line-height: 1.7; }
  .frase { font-family: 'Dancing Script', cursive; font-size: clamp(22px, 6vw, 30px); color: var(--tinta); margin-top: 30px; text-align: center; line-height: 1.3; }
  .cargando { color: #999; padding: 40px 0; }
  .aviso { font-size: 15px; color: #666; line-height: 1.6; }
</style>
</head>
<body>
<img class="logo" src="logo_elviaje.png" alt="el viaje Craft Beer">
<div class="codigo" id="cod"></div>
<div class="carta" id="carta"><div class="cargando">⏳ Un momento…</div></div>
<div class="frase">mente, corazón e intención<br>en cada gota</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbznp6ECYaCj3UOo0MwJAGuuVSGFhn4nC4y25_wvFUJ7NlDPhccawZM4bJO_fkfzKQUjEw/exec';
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

(function() {
  var m = location.search.match(/[?&]codigo=([A-Za-z0-9-]+)/i);
  var carta = document.getElementById('carta');
  if (!m) { carta.innerHTML = '<div class="aviso">Escanea el código QR de un barril para ver qué contiene.</div>'; return; }
  var cod = m[1].toUpperCase();
  document.getElementById('cod').textContent = 'BARRIL ' + cod;
  fetch(API + '?api=kegPublico&datos=' + encodeURIComponent(JSON.stringify({ texto: cod })))
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (!r.ok) { carta.innerHTML = '<div class="aviso">No encontramos este barril. (' + esc(r.error || '') + ')</div>'; return; }
      var p = r.pub;
      if (!p.producto) {
        carta.innerHTML = '<div class="aviso">Este barril está descansando en la cervecería.<br>Pronto volverá lleno de cerveza fresca. 🍺</div>';
        return;
      }
      var h = '<div class="producto">' + esc(p.producto) + '</div>';
      if (p.estilo) h += '<div class="estilo">' + esc(p.estilo).toUpperCase() + '</div>';
      var datos = '';
      if (p.abv) datos += '<div class="dato"><div class="v">' + esc(p.abv) + (String(p.abv).indexOf('%') === -1 ? '%' : '') + '</div><div class="k">ALC. VOL.</div></div>';
      if (p.ibu) datos += '<div class="dato"><div class="v">' + esc(p.ibu) + '</div><div class="k">IBU</div></div>';
      if (p.capacidad) datos += '<div class="dato"><div class="v">' + esc(p.capacidad) + ' L</div><div class="k">BARRIL</div></div>';
      if (datos) h += '<div class="datos">' + datos + '</div>';
      if (p.descripcion) h += '<div class="desc">' + esc(p.descripcion) + '</div>';
      if (p.descripcion_en) h += '<div class="desc-en">' + esc(p.descripcion_en) + '</div>';
      var lote = [];
      if (p.lote) lote.push('Lote ' + esc(p.lote));
      if (p.envasado) lote.push('Envasado: ' + esc(p.envasado));
      if (lote.length) h += '<div class="lote">' + lote.join(' · ') + '</div>';
      carta.innerHTML = h;
    })
    .catch(function() {
      carta.innerHTML = '<div class="aviso">No se pudo cargar la información. Revisa tu conexión e intenta de nuevo.</div>';
    });
})();
</script>
</body>
</html>
